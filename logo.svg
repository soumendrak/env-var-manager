  <rect x="166" y="348" width="40" height="6" rx="3" fill="#ff6b35" opacity="0.8"/>
  <rect x="166" y="360" width="30" height="6" rx="3" fill="#ff6b35" opacity="0.6"/>
  <!-- Env var lines -->
  <line x1="330" y1="350" x2="380" y2="350" stroke="#e0e0e0" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="325" y1="375" x2="385" y2="375" stroke="#e0e0e0" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
  <line x1="335" y1="400" x2="375" y2="400" stroke="#e0e0e0" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
</svg>
