  <rect x="250" y="200" width="12" height="30" rx="4" fill="#ff6b35"/>
  <!-- Key -->
  <path d="M160 340 L160 300" stroke="#e0e0e0" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
